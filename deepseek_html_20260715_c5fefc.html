<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤝 Знакомства</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>🤝 Знакомства</h1>
            <div id="status" class="status">
                <span id="statusText">👋 Добро пожаловать!</span>
            </div>
        </header>

        <main>
            <div id="controls">
                <button id="findBtn" class="btn btn-primary">🔍 Найти собеседника</button>
                <button id="nextBtn" class="btn btn-success hidden">➡️ Следующий</button>
                <button id="stopBtn" class="btn btn-danger hidden">❌ Закончить</button>
            </div>

            <div id="chatArea" class="hidden">
                <div id="messages" class="messages"></div>
                <div class="input-area">
                    <textarea id="msgInput" placeholder="Введите сообщение..." rows="2"></textarea>
                    <button id="sendBtn" class="btn btn-primary">📤</button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
