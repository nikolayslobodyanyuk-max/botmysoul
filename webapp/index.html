<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 Поиск родственной души</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Georgia', 'Times New Roman', serif; 
            background: linear-gradient(135deg, #fce4ec 0%, #f8e8e8 50%, #fce4ec 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(233, 30, 99, 0.15);
            backdrop-filter: blur(10px);
        }
        h1 { 
            text-align: center; 
            font-size: 28px; 
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e91e63, #f06292);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #ad1457;
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
            -webkit-text-fill-color: #ad1457;
        }
        .status { 
            background: linear-gradient(135deg, #fce4ec, #f8e8e8);
            padding: 18px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            text-align: center; 
            min-height: 60px;
            font-size: 16px;
            color: #4a148c;
            border: 1px solid rgba(233, 30, 99, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-bottom: 10px; 
            color: #fff;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 30, 99, 0.3);
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { 
            background: linear-gradient(135deg, #e91e63, #f06292);
            color: #fff;
        }
        .btn-danger { 
            background: linear-gradient(135deg, #d32f2f, #ef5350);
            color: #fff;
        }
        .btn-success { 
            background: linear-gradient(135deg, #2e7d32, #66bb6a);
            color: #fff;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #7b1fa2, #ab47bc);
            color: #fff;
        }
        .hidden { display: none !important; }
        .chat-area { margin-top: 20px; }
        .messages { 
            background: #fafafa; 
            border-radius: 16px; 
            padding: 15px; 
            min-height: 250px; 
            max-height: 350px; 
            overflow-y: auto;
            border: 1px solid rgba(233, 30, 99, 0.08);
        }
        .msg { 
            padding: 10px 16px; 
            border-radius: 16px; 
            margin-bottom: 8px; 
            max-width: 80%; 
            word-wrap: break-word;
            animation: fadeIn 0.4s ease;
        }
        .msg.incoming { 
            background: #fce4ec; 
            color: #4a148c;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .msg.outgoing { 
            background: linear-gradient(135deg, #e91e63, #f06292);
            color: #fff; 
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .msg.system { 
            background: transparent; 
            text-align: center; 
            font-style: italic; 
            color: #7b1fa2; 
            max-width: 100%;
            font-size: 13px;
            padding: 8px;
        }
        .input-row { 
            display: flex; 
            gap: 10px; 
            margin-top: 12px;
        }
        .input-row input { 
            flex: 1; 
            padding: 14px 16px; 
            border: 2px solid #f8e8e8; 
            border-radius: 16px; 
            font-size: 15px;
            font-family: 'Georgia', serif;
            background: #fafafa;
            transition: border-color 0.3s;
        }
        .input-row input:focus { 
            outline: none; 
            border-color: #e91e63;
        }
        .input-row .btn { 
            width: auto; 
            padding: 14px 24px; 
            margin: 0; 
        }
        .heart-decoration {
            text-align: center;
            font-size: 20px;
            color: #e91e63;
            margin: 10px 0;
            opacity: 0.6;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-thumb { 
            background: #f06292; 
            border-radius: 3px;
        }
        .messages::-webkit-scrollbar-track { background: #fce4ec; border-radius: 3px; }
    </style>
</head>
<body>
<div class="container">
    <h1>💖 Родственная душа</h1>
    <div class="subtitle">✨ Тот, кто поймёт тебя без слов</div>
    
    <div id="status" class="status">💫 Нажми кнопку, чтобы начать поиск</div>
    
    <button id="findBtn" class="btn btn-primary">💖 Найти свою половинку</button>
    <button id="nextBtn" class="btn btn-secondary hidden">🌊 Продолжить поиск</button>
    <button id="stopBtn" class="btn btn-danger hidden">💔 Завершить диалог</button>
    
    <div class="heart-decoration">♥ ♡ ♥ ♡ ♥</div>
    
    <div id="chatArea" class="chat-area hidden">
        <div id="messages" class="messages"></div>
        <div class="input-row">
            <input id="msgInput" type="text" placeholder="Напиши что-то от сердца...">
            <button id="sendBtn" class="btn btn-primary">💌</button>
        </div>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const statusEl = document.getElementById('status');
const findBtn = document.getElementById('findBtn');
const nextBtn = document.getElementById('nextBtn');
const stopBtn = document.getElementById('stopBtn');
const chatArea = document.getElementById('chatArea');
const messages = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

let inChat = false;

function sendToBot(action, data = {}) {
    tg.sendData(JSON.stringify({ action, ...data }));
}

function addMessage(text, type = 'incoming') {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function clearChat() { messages.innerHTML = ''; }

function updateUI(statusText, inChatState, waiting = false) {
    inChat = inChatState;
    statusEl.textContent = statusText;
    
    if (inChat) {
        findBtn.classList.add('hidden');
        nextBtn.classList.remove('hidden');
        stopBtn.classList.remove('hidden');
        chatArea.classList.remove('hidden');
        findBtn.disabled = false;
    } else {
        findBtn.classList.remove('hidden');
        nextBtn.classList.add('hidden');
        stopBtn.classList.add('hidden');
        chatArea.classList.add('hidden');
        findBtn.disabled = waiting;
        findBtn.textContent = waiting ? '⏳ Поиск...' : '💖 Найти свою половинку';
    }
}

findBtn.onclick = () => {
    sendToBot('find');
    updateUI('🔮 Ищем твою родственную душу...', false, true);
};

nextBtn.onclick = () => {
    sendToBot('next');
    clearChat();
    updateUI('🌊 Продолжаем поиск...', false, true);
};

stopBtn.onclick = () => {
    sendToBot('stop');
    clearChat();
    updateUI('💔 Диалог завершён. Будь открыт(а) для новой встречи!', false);
};

sendBtn.onclick = () => {
    const text = msgInput.value.trim();
    if (text && inChat) {
        sendToBot('message', { text });
        addMessage(text, 'outgoing');
        msgInput.value = '';
    }
};

msgInput.onkeydown = (e) => {
    if (e.key === 'Enter') sendBtn.click();
};

tg.onEvent('message', (data) => {
    try {
        const parsed = JSON.parse(data);
        console.log('Получено:', parsed);
        
        switch(parsed.action) {
            case 'chat_started':
                updateUI('💞 Ты нашёл(а) свою родственную душу!', true);
                clearChat();
                addMessage('💖 Привет! Возможно, мы искали друг друга всю жизнь. Расскажи о себе.', 'system');
                break;
            case 'chat_ended':
                updateUI(parsed.text || '💔 Диалог завершён', false);
                clearChat();
                if (parsed.text) addMessage(parsed.text, 'system');
                break;
            case 'partner_left':
                updateUI(parsed.text || '✨ Путь продолжается...', false);
                clearChat();
                if (parsed.text) addMessage(parsed.text, 'system');
                break;
            case 'waiting':
                updateUI('🔮 ' + parsed.text, false, true);
                break;
            case 'new_message':
                if (inChat) addMessage(parsed.text, 'incoming');
                break;
            case 'error':
                statusEl.textContent = '❌ ' + parsed.text;
                findBtn.disabled = false;
                break;
        }
    } catch(e) { console.error('Ошибка:', e); }
});

tg.ready();
console.log('💖 Приложение для поиска родственной души готово!');
</script>
</body>
</html>
