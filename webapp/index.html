<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: linear-gradient(135deg, #fce4ec, #f8e8e8); padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: rgba(255,255,255,0.9); border-radius: 24px; padding: 25px; box-shadow: 0 10px 40px rgba(233,30,99,0.15); }
        h1 { text-align: center; font-size: 24px; background: linear-gradient(135deg, #e91e63, #f06292); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #4a148c; }
        select, input { width: 100%; padding: 12px; border: 2px solid #f8e8e8; border-radius: 12px; font-size: 16px; font-family: 'Georgia', serif; background: #fafafa; }
        select:focus, input:focus { outline: none; border-color: #e91e63; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; color: #fff; background: linear-gradient(135deg, #e91e63, #f06292); transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,30,99,0.3); }
        .interests-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .interest-btn { padding: 10px; border: 2px solid #f8e8e8; border-radius: 12px; background: #fafafa; cursor: pointer; text-align: center; transition: all 0.2s; font-size: 14px; }
        .interest-btn.selected { background: #e91e63; color: #fff; border-color: #e91e63; }
        .subtitle { text-align: center; color: #ad1457; font-size: 14px; margin-bottom: 20px; font-style: italic; }
        .city-input { position: relative; }
        .city-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 2px solid #f8e8e8; border-radius: 12px; max-height: 150px; overflow-y: auto; display: none; z-index: 10; }
        .city-suggestion { padding: 10px 12px; cursor: pointer; }
        .city-suggestion:hover { background: #fce4ec; }
    </style>
</head>
<body>
<div class="container">
    <h1>💖 Создание профиля</h1>
    <div class="subtitle">Расскажи о себе, чтобы найти идеальную пару</div>
    
    <div class="field">
        <label>⚤ Ваш пол</label>
        <select id="gender">
            <option value="">Выберите...</option>
            <option value="male">Мужской</option>
            <option value="female">Женский</option>
            <option value="other">Другой</option>
        </select>
    </div>
    
    <div class="field">
        <label>📅 Ваш возраст</label>
        <input type="number" id="age" placeholder="Введите возраст" min="18" max="99">
    </div>
    
    <div class="field">
        <label>📍 Ваш город</label>
        <div class="city-input">
            <input type="text" id="city" placeholder="Введите город" autocomplete="off">
            <div class="city-suggestions" id="suggestions"></div>
        </div>
    </div>
    
    <div class="field">
        <label>🎯 Ваши интересы</label>
        <div class="interests-grid" id="interests">
            <div class="interest-btn" data-interest="Книги">📚 Книги</div>
            <div class="interest-btn" data-interest="Фильмы">🎬 Фильмы</div>
            <div class="interest-btn" data-interest="Музыка">🎵 Музыка</div>
            <div class="interest-btn" data-interest="Путешествия">✈️ Путешествия</div>
            <div class="interest-btn" data-interest="Спорт">⚽ Спорт</div>
            <div class="interest-btn" data-interest="Искусство">🎨 Искусство</div>
            <div class="interest-btn" data-interest="Наука">🔬 Наука</div>
            <div class="interest-btn" data-interest="Кулинария">🍳 Кулинария</div>
            <div class="interest-btn" data-interest="Йога">🧘 Йога</div>
            <div class="interest-btn" data-interest="Фотография">📸 Фотография</div>
            <div class="interest-btn" data-interest="Психология">🧠 Психология</div>
            <div class="interest-btn" data-interest="Природа">🌿 Природа</div>
        </div>
    </div>
    
    <button class="btn" onclick="saveProfile()">💖 Сохранить и продолжить</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const cities = [
    "Москва", "Санкт-Петербург", "Новосибирск", "Екатеринбург", "Казань",
    "Нижний Новгород", "Челябинск", "Самара", "Омск", "Ростов-на-Дону",
    "Уфа", "Красноярск", "Воронеж", "Пермь", "Волгоград",
    "Краснодар", "Саратов", "Тюмень", "Тольятти", "Ижевск",
    "Барнаул", "Ульяновск", "Иркутск", "Хабаровск", "Ярославль"
];

const interests = [];

document.querySelectorAll('.interest-btn').forEach(btn => {
    btn.onclick = () => {
        btn.classList.toggle('selected');
        const interest = btn.dataset.interest;
        const index = interests.indexOf(interest);
        if (index > -1) {
            interests.splice(index, 1);
        } else {
            interests.push(interest);
        }
    };
});

// Автодополнение города
const cityInput = document.getElementById('city');
const suggestions = document.getElementById('suggestions');

cityInput.addEventListener('input', function() {
    const query = this.value.toLowerCase();
    if (query.length < 1) {
        suggestions.style.display = 'none';
        return;
    }
    const matches = cities.filter(c => c.toLowerCase().includes(query));
    if (matches.length > 0) {
        suggestions.innerHTML = matches.map(c => 
            `<div class="city-suggestion" onclick="selectCity('${c}')">${c}</div>`
        ).join('');
        suggestions.style.display = 'block';
    } else {
        suggestions.style.display = 'none';
    }
});

function selectCity(city) {
    cityInput.value = city;
    suggestions.style.display = 'none';
}

document.addEventListener('click', function() {
    suggestions.style.display = 'none';
});

function saveProfile() {
    const gender = document.getElementById('gender').value;
    const age = document.getElementById('age').value;
    const city = document.getElementById('city').value;
    
    if (!gender || !age || !city) {
        alert('⚠️ Пожалуйста, заполните все поля!');
        return;
    }
    
    tg.sendData(JSON.stringify({
        action: 'register',
        gender: gender,
        age: age,
        city: city,
        interests: interests
    }));
    
    alert('✅ Профиль сохранён! Теперь вернитесь в бот и нажмите "Найти свою половинку"');
    tg.close();
}

tg.ready();
</script>
</body>
</html>
